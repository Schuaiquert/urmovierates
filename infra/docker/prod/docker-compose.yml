version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:***@postgres:5432/urmovierates
      - REDIS_URL=redis://redis:6379
      - API_KEY=***
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: npm run start
    restart: unless-stopped
    networks:
      - urmovierates

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=urmovierates
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - urmovierates

  redis:
    image: redis:7-alpine
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    networks:
      - urmovierates

networks:
  urmovierates:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data: